name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Display info
        run: |
          echo "Java version:"
          java -version
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -la
          echo "Gradle wrapper:"
          ls -la gradle/wrapper/

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Try Gradle version
        run: ./gradlew --version

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace --info

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Assistant-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Show APK info
        run: |
          echo "Looking for APK..."
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug directory not found"
